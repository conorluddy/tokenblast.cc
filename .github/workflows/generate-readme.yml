name: Generate README

on:
  push:
    branches: [main]
    paths: [flags/**]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate README from flags
        run: node scripts/generate-readme.js

      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update README from flags/${{ github.sha }}"
          title: "Update README from flags"
          body: "Automated README regeneration from `flags/${{ github.sha }}`."
          branch: bot/update-readme
          delete-branch: true
          add-paths: README.md
