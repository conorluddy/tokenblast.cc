name: Check for new Claude Code version

on:
  schedule:
    - cron: "0 9 * * *" # Daily 9am UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install latest Claude Code
        run: |
          npm init -y
          npm install @anthropic-ai/claude-code --silent 2>/dev/null
          echo "INSTALLED_VERSION=$(node -e "console.log(require('./node_modules/@anthropic-ai/claude-code/package.json').version)")" >> "$GITHUB_ENV"

      - name: Extract and diff flags
        id: diff
        run: |
          # The npm package switched to native-binary distribution; cli.js no
          # longer exists. Extract symbols from the ELF binary via `strings`.
          BINARY="node_modules/@anthropic-ai/claude-code/bin/claude.exe"
          if [[ ! -f "$BINARY" ]]; then
            echo "ERROR: Binary not found at $BINARY — package layout may have changed."
            exit 1
          fi

          LATEST=$(node -e "console.log(JSON.parse(require('fs').readFileSync('flags/manifest.json')).latest)")
          echo "previous_version=$LATEST" >> "$GITHUB_OUTPUT"

          # Extract keys from source (with exclusions)
          strings "$BINARY" | grep -oE '(CLAUDE_CODE_|ANTHROPIC_)[A-Z_]+' | sort -u \
            | grep -v -E '^CLAUDE_CODE_DISABLE_$|^CLAUDE_CODE_$|^CLAUDE_CODE_EXECPATH$|^CLAUDE_CODE_SANDBOXED$|^CLAUDE_CODE_SCRIPT_CAPS$|^CLAUDE_CODE_SDK_HAS_OAUTH_REFRESH$|^CLAUDE_CODE_SIMULATE_PROXY_USAGE$|^CLAUDE_CODE_ULTRAREVIEW_PREFLIGHT_FIXTURE$|^CLAUDE_CODE_SKIP_ANTHROPIC_AWS_AUTH$|^CLAUDE_CODE_SKIP_FAST_MODE_ORG_CHECK$|^CLAUDE_CODE_PLUGIN_KEEP_MARKETPLACE_ON_FAILURE$|^CLAUDE_CODE_REPO_CHECKOUTS$|^ANTHROPIC_AWS$' \
            > /tmp/source_keys.txt

          # Extract keys from current snapshot
          node -e "
            const d = JSON.parse(require('fs').readFileSync('flags/$LATEST.json'));
            d.flags.forEach(f => console.log(f.key));
          " | sort -u > /tmp/prev_keys.txt

          ADDED=$(comm -23 /tmp/source_keys.txt /tmp/prev_keys.txt | wc -l | tr -d ' ')
          REMOVED=$(comm -13 /tmp/source_keys.txt /tmp/prev_keys.txt | wc -l | tr -d ' ')

          echo "added=$ADDED" >> "$GITHUB_OUTPUT"
          echo "removed=$REMOVED" >> "$GITHUB_OUTPUT"

          if [[ "$ADDED" -eq 0 && "$REMOVED" -eq 0 ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No flag changes detected between $LATEST and ${{ env.INSTALLED_VERSION }}"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Flag changes detected: +$ADDED -$REMOVED"
          fi

      - name: Generate new snapshot
        if: steps.diff.outputs.changed == 'true'
        run: |
          # Clean up npm artifacts before running the script
          rm -rf node_modules package.json package-lock.json
          ./scripts/update-flags.sh

      - name: Generate README
        if: steps.diff.outputs.changed == 'true'
        run: node scripts/generate-readme.js

      - name: Clean up npm artifacts
        if: steps.diff.outputs.changed == 'true'
        run: rm -rf node_modules package.json package-lock.json

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        run: |
          BRANCH="flags/update-${{ env.INSTALLED_VERSION }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Clean up any stale remote branch / open PR from a prior failed run
          if gh pr view "$BRANCH" --json state --jq .state >/dev/null 2>&1; then
            gh pr close "$BRANCH" --delete-branch || true
          elif git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git push origin --delete "$BRANCH" || true
          fi

          git checkout -b "$BRANCH"
          git add flags/ README.md
          git commit -m "Update flags to Claude Code v${{ env.INSTALLED_VERSION }}"
          git push -u origin "$BRANCH"

          ADDED="${{ steps.diff.outputs.added }}"
          REMOVED="${{ steps.diff.outputs.removed }}"
          PREV="${{ steps.diff.outputs.previous_version }}"

          PR_URL=$(gh pr create \
            --title "Update flags: v${PREV} → v${{ env.INSTALLED_VERSION }}" \
            --body "$(cat <<EOF
          ## Auto-detected flag changes

          **Claude Code v${PREV} → v${{ env.INSTALLED_VERSION }}**

          - Added: ${ADDED} flag(s)
          - Removed: ${REMOVED} flag(s)

          New flags ship with placeholder descriptions (\`TODO: Add description\`) and get backfilled on occasion.

          Generated by [check-new-version](.github/workflows/check-new-version.yml) workflow.
          EOF
          )")

          gh pr merge --squash --auto "$PR_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
